<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Store</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#fff7f0;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
  color:#ff7a00;
}

.search-box {
  margin-bottom:15px;
}

.search {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.item {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.05);
  transition:0.2s;
}

.hidden {
  opacity:0.2;
}

.name {
  font-weight:bold;
}

.price {
  color:#ff7a00;
  margin-top:5px;
}

.stock {
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">
  <h1>🍊 Orange Store</h1>

  <div class="search-box">
    <input type="text" class="search" placeholder="검색..." onkeyup="filterItems(this.value)">
  </div>

  <div id="list">
    <div class="item" data-name="신화 상자">
      <div class="name">신화 상자</div>
      <div class="price">0.1 / 5천개</div>
      <div class="stock">재고 입고 예정</div>
    </div>

    <div class="item" data-name="클랜 재시작">
      <div class="name">클랜 재시작</div>
      <div class="price">0.1 / 2만개</div>
      <div class="stock">재고 1M</div>
    </div>

    <div class="item" data-name="패시브 샤드">
      <div class="name">패시브 샤드</div>
      <div class="price">0.1 / 6만개</div>
      <div class="stock">재고 320k</div>
    </div>

    <div class="item" data-name="파워 샤드">
      <div class="name">파워 샤드</div>
      <div class="price">0.1 / 5천개</div>
      <div class="stock">재고 49k</div>
    </div>
  </div>

</div>

<script>
function filterItems(keyword) {
  const items = document.querySelectorAll(".item");

  items.forEach(item => {
    const name = item.getAttribute("data-name");

    if(name.includes(keyword)) {
      item.classList.remove("hidden");
    } else {
      item.classList.add("hidden");
    }
  });
}
</script>

</body>
</html>
