<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가격표</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 { font-size: 22px; margin-bottom: 24px; color: #222; }
  .category { width: 100%; max-width: 480px; margin-bottom: 12px; }
  .cat-btn {
    width: 100%;
    padding: 14px 20px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s;
  }
  .cat-btn:hover { background: #ebebeb; }
  .cat-btn .arrow { transition: transform 0.2s; }
  .cat-btn.open .arrow { transform: rotate(90deg); }
  .items { display: none; border: 1px solid #eee; border-top: none; border-radius: 0 0 10px 10px; }
  .items.open { display: block; }
  .item {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    font-size: 15px;
    border-bottom: 1px solid #f0f0f0;
  }
  .item:last-child { border-bottom: none; }
  .item .price { font-weight: 700; }
  .item .unit { color: #888; font-size: 13px; margin-left: 6px; }
</style>
</head>
<body>
<h1>💰 가격표</h1>
<div class="category">
  <button class="cat-btn" onclick="toggle(this)">클랜 <span class="arrow">▶</span></button>
  <div class="items">
    <div class="item"><span>리롤</span><span class="price">0.1<span class="unit">/ 10k</span></span></div>
    <div class="item"><span>가입</span><span class="price">500<span class="unit">원</span></span></div>
  </div>
</div>
<div class="category">
  <button class="cat-btn" onclick="toggle(this)">계정 <span class="arrow">▶</span></button>
  <div class="items">
    <div class="item"><span>일반</span><span class="price">2,000<span class="unit">원</span></span></div>
    <div class="item"><span>레어</span><span class="price">5,000<span class="unit">원</span></span></div>
  </div>
</div>
<script>
  function toggle(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('open');
  }
</script>
</body>
</html>
