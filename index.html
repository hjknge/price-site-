<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Store</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#fff7f0;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
  color:#ff7a00;
}

.search {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ddd;
}

.item {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.05);
}

.name {
  font-weight:bold;
}

.price {
  color:#ff7a00;
  margin-top:5px;
}

.stock {
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">
  <h1>🍊 Orange Store</h1>

  <input type="text" class="search" placeholder="검색..." onkeyup="searchItem(this.value)">

  <div id="list"></div>
</div>

<script>
const items = [
  {name:"신화 상자", price:"0.1 / 5천개", stock:"재고 30"},
  {name:"클랜 재시작", price:"0.1 / 1만개", stock:"재고 250k"},
  {name:"패시브 샤드", price:"0.1 / 5만개", stock:"재고 500k"},
  {name:"파워 샤드", price:"0.1 / 1천개", stock:"재고 80"},
  {name:"보스 티켓", price:"0.1 / 1만개", stock:"재고 56"}
];

function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="item">
        <div class="name">${item.name}</div>
        <div class="price">${item.price}</div>
        <div class="stock">${item.stock}</div>
      </div>
    `;
  });
}

function searchItem(keyword) {
  const filtered = items.filter(item =>
    item.name.includes(keyword)
  );
  render(filtered);
}

render(items);
</script>

</body>
</html>
