<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Store</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#fff7f0;
  color:#333;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.header {
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}

.header img {
  width:40px;
  margin-right:10px;
}

.header h1 {
  color:#ff7a00;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff7a00;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
}

.item:last-child {
  border:none;
}

.price {
  color:#ff7a00;
  font-weight:bold;
}

.delete {
  background:#ff4d4d;
  padding:5px 10px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="여기에_이미지링크">
    <h1>Orange Store</h1>
  </div>

  <div class="card">
    <input id="name" placeholder="제품명">
    <input id="price" placeholder="가격 (예: 0.1 / 5천개)">
    <button onclick="addItem()">추가</button>
  </div>

  <div class="card" id="list"></div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || [];

function save() {
  localStorage.setItem("items", JSON.stringify(items));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, index) => {
    list.innerHTML += `
      <div class="item">
        <div>
          <div>${item.name}</div>
          <div class="price">${item.price}</div>
        </div>
        <div class="delete" onclick="removeItem(${index})">삭제</div>
      </div>
    `;
  });
}

function addItem() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  if(!name || !price) return;

  items.push({name, price});
  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
}

function removeItem(index) {
  items.splice(index,1);
  save();
  render();
}

render();
</script>

</body>
</html>
